    const raids = personalData.raids || [];
    const totalBest = {}, eachBest = {};
    raids.forEach(r=>{
      const w = getWeekday(r.date);
      const total = r.totalNum;
      if(total!=null && (!totalBest[w] || total>totalBest[w].value)) totalBest[w] = {value: total, date: r.date};
      const v = r.raid1Num;
      if(v!=null && (!eachBest[w] || v>eachBest[w].value)) eachBest[w] = {value: v, date: r.date};
    });

    function tableFor(bestMap, label){
      const body = WEEKDAYS.map(w=>{
        const b = bestMap[w];
        return `<tr>
          <td>${w}</td>
          <td style="font-family:'JetBrains Mono',monospace;">${b?esc(formatScoreForScope(b.value,'internal')):'ー'}</td>
          <td style="font-family:'JetBrains Mono',monospace;color:var(--text-faint);">${b?fmtDateJP(b.date):'ー'}</td>
        </tr>`;
      }).join('');
      return `
        <div class="mi-panel">
          <div class="mi-panel-title">${label}</div>
          <table class="mi-table">
            <thead><tr><th>曜日</th><th>最高スコア</th><th>達成日</th></tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>`;
    }

    if(!raids.length){
      return `<div class="mi-panel"><div class="mi-empty">まだ討伐スコアの記録がありません。「📝 記録」タブから登録してください。</div></div>`;
    }
    return tableFor(totalBest, '📋 2討伐合計：曜日別ベスト') + tableFor(eachBest, '📋 1討伐：曜日別ベスト');
  }

  function renderPersonalGraph(){
    const sd = scopedState();
    const raids = personalData.raids || [];
    const allDatesAsc = [...new Set(raids.map(r=>r.date))].sort();
    const start = sd.personalGraphRangeStart || (allDatesAsc[0]||todayStr());
    const end = sd.personalGraphRangeEnd || (allDatesAsc[allDatesAsc.length-1]||todayStr());
    const weekdays = state.personalGraphWeekdays;

    const dates = allDatesAsc.filter(d=>
      d>=start && d<=end && (weekdays.length===0 || weekdays.includes(getWeekday(d)))
    );

    let series;
    if(state.personalGraphMetric==='each'){
      series = [
        {clan:'討伐1', color:LINE_COLORS[0], pts: dates.map(d=>{ const r = raids.find(x=>x.date===d); return r&&r.raid1Num!=null ? r.raid1Num : null; })}
      ];
    } else {
      series = [
        {clan:'合計', color:LINE_COLORS[0], pts: dates.map(d=>{ const r = raids.find(x=>x.date===d); return r && r.totalNum!=null ? r.totalNum : null; })}
      ];
    }

    let chart = `<div class="mi-empty">対象期間にデータがありません</div>`;
    if(dates.length){
      chart = buildLineChart(dates, series, {invert:false, labelFormatter: v=>formatShort(v)});
    }

    return `
      <div class="mi-panel">
        <div class="mi-panel-title">期間</div>
        ${renderDateRangePicker(sd, start, end, 'personalGraphRange')}

        <div class="mi-panel-title" style="margin-top:14px;">曜日で絞り込み（複数選択可・未選択なら全曜日）</div>
        <div class="mi-pillrow" id="mi-personal-weekday-pillrow" data-preserve-scroll>
          ${WEEKDAYS.map(w=>`<div class="mi-pill ${weekdays.includes(w)?'active':''}" data-action="personalGraphWeekday" data-val="${w}">${w}</div>`).join('')}
        </div>

        <div class="mi-panel-title" style="margin-top:14px;">表示する指標</div>
        <div class="mi-subtabs">
          <div class="mi-subtab ${state.personalGraphMetric==='total'?'active':''}" data-action="personalGraphMetric" data-val="total">2討伐合計</div>
          <div class="mi-subtab ${state.personalGraphMetric==='each'?'active':''}" data-action="personalGraphMetric" data-val="each">討伐1</div>
        </div>

        ${chart}
      </div>`;
  }

  // ---------- event delegation ----------
  app.addEventListener('click', async (ev)=>{
    const el = ev.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const val = el.dataset.val;
    const scope = state.scope;
    const sd = scopedState();

    if(action==='setScope'){ state.scope = val; state.modal = null; render(); return; }
    if(action==='tab'){ state.tab = val; render(); return; }
    if(action==='rankDate'){ sd.rankDate = val; render(); return; }
    if(action==='graphMode'){ sd.graphMode = val; render(); return; }
    if(action==='graphMetric'){ sd.graphMetric = val; render(); return; }
    if(action==='graphBoss'){ sd.graphBoss = val; render(); return; }
    if(action==='manageFilter'){
      sd.manageFilter = sd.manageFilter.includes(val) ? sd.manageFilter.filter(n=>n!==val) : [...sd.manageFilter, val];
      render(); return;
    }
    if(action==='manageFilterAll'){ sd.manageFilter = []; render(); return; }
    if(action==='tableSub'){ sd.tableSub = val; render(); return; }
    if(action==='registerMode'){ sd.registerMode = val; render(); return; }

    if(action==='noop'){ return; }
    if(action==='showHistory'){ state.modal = {scope, name: val}; render(); return; }
    if(action==='closeModal'){ state.modal = null; render(); return; }

    if(action==='openCal'){
      // val is like "table:start" / "graph:end" / "bulkDate:single"
      if(sd.calOpenField===val){
        sd.calOpenField = null;
      } else {
        sd.calOpenField = val;
        const [target, field] = val.split(':');
        const current = field==='single' ? sd[target] : sd[`${target}Range${field==='start'?'Start':'End'}`];
        sd.calViewMonth = monthOf(current);
      }
      render(); return;
    }
    if(action==='calPrevMonth'){
      sd.calViewMonth = shiftMonth(sd.calViewMonth || monthOf(null), -1);
      render(); return;
    }
    if(action==='calNextMonth'){
      sd.calViewMonth = shiftMonth(sd.calViewMonth || monthOf(null), 1);
      render(); return;
    }
    if(action==='pickCalDate'){
      if(sd.calOpenField){
        const [target, field] = sd.calOpenField.split(':');
        if(field==='single'){
          sd[target] = val;
        } else {
          const startKey = `${target}RangeStart`, endKey = `${target}RangeEnd`;
          if(field==='start'){
            sd[startKey] = val;
            if(sd[endKey] && val>sd[endKey]) sd[endKey] = val;
          } else {
            sd[endKey] = val;
            if(sd[startKey] && val<sd[startKey]) sd[startKey] = val;
          }
        }
      }
      sd.calOpenField = null;
      render(); return;
    }
    if(action==='manageSort'){
      if(sd.manageSortKey===val){ sd.manageSortDir = sd.manageSortDir==='asc'?'desc':'asc'; }
      else { sd.manageSortKey = val; sd.manageSortDir = (val==='rank') ? 'asc' : 'desc'; }
      render(); return;
    }
    if(action==='toggleCollapse'){
      state.collapse[val] = !isPanelOpen(val);
      render(); return;
    }

    if(action==='addTrendName'){
      const sel = document.getElementById('mi-trend-select');
      if(sel && sel.value && !sd.trendNames.includes(sel.value)){
        sd.trendNames.push(sel.value);
      }
      render(); return;
    }
    if(action==='removeTrendName'){
      sd.trendNames = sd.trendNames.filter(m=>m!==val);
      render(); return;
    }
    if(action==='addAllTrendNames'){
      sd.trendNames = getVisibleRoster(scope).slice();
      render(); return;
    }
    if(action==='clearTrendNames'){
      sd.trendNames = [];
      render(); return;
    }

    if(action==='adminLogin'){
      const pw = document.getElementById('mi-admin-pw').value;
      if(pw === settings.password){
        state.adminLoggedIn = true; state.adminErr = false;
      } else {
        state.adminErr = true;
      }
      render(); return;
    }
    if(action==='adminLogout'){ state.adminLoggedIn = false; render(); return; }

    if(action==='personalLogin'){
      const pw = document.getElementById('mi-personal-pw').value;
      if(pw === personalData.password){
        state.personalLoggedIn = true; state.personalErr = false;
      } else {
        state.personalErr = true;
      }
      render(); return;
    }
    if(action==='personalLogout'){ state.personalLoggedIn = false; render(); return; }
    if(action==='personalTab'){ state.personalTab = val; render(); return; }
    if(action==='personalGraphWeekday'){
      state.personalGraphWeekdays = state.personalGraphWeekdays.includes(val)
        ? state.personalGraphWeekdays.filter(w=>w!==val)
        : [...state.personalGraphWeekdays, val];
      render(); return;
    }
    if(action==='personalGraphMetric'){ state.personalGraphMetric = val; render(); return; }

    if(action==='savePersonalRaid'){
      const date = sd.personalRaidDate || yesterdayStr();
      const totalInput = document.getElementById('mi-personal-total');
      const r1Input = document.getElementById('mi-personal-raid1');
      const totalRawInput = totalInput ? totalInput.value.trim() : '';
      const raid1RawInput = r1Input ? r1Input.value.trim() : '';
      if(!totalRawInput){ showToast('2討伐合計を入力してください'); return; }
      const totalParsed = parseImportedScore(totalRawInput, 'internal');
      if(totalParsed.scoreNum==null){ showToast('2討伐合計の形式を確認してください'); return; }
      let raid1Raw='', raid1Num=null;
      if(raid1RawInput){
        const p = parseImportedScore(raid1RawInput, 'internal');
        if(p.scoreNum!=null){ raid1Raw = p.scoreRaw; raid1Num = p.scoreNum; }
      }
      if(!personalData.raids) personalData.raids = [];
      const idx = personalData.raids.findIndex(r=>r.date===date);
      const rec = {id: idx>=0 ? personalData.raids[idx].id : uid(), date, totalRaw: totalParsed.scoreRaw, totalNum: totalParsed.scoreNum, raid1Raw, raid1Num};
      if(idx>=0) personalData.raids[idx] = rec; else personalData.raids.push(rec);
      await savePersonalData();
      showToast('討伐スコアを保存しました');
      return;
    }
    if(action==='deletePersonalRaid'){
      personalData.raids = (personalData.raids||[]).filter(r=>r.id!==val);
      await savePersonalData();
      render();
      return;
    }
    if(action==='personalCsvImport'){
      const fileInput = document.getElementById('mi-personal-csv-file');
      const file = fileInput && fileInput.files && fileInput.files[0];
      if(!file){ showToast('CSVファイルを選択してください'); return; }
      if(typeof Papa === 'undefined'){ showToast('CSV解析ライブラリの読み込みに失敗しました'); return; }
      try{
        const text = await readFileAsText(file);
        const {rows, headerError} = parsePersonalCsv(text);
        if(headerError){ showToast('date・score列が見つかりませんでした'); return; }
        if(!rows.length){ showToast('取り込めるデータが見つかりませんでした'); return; }
        if(!personalData.raids) personalData.raids = [];
        let added=0, updated=0;
        rows.forEach(row=>{
          const idx = personalData.raids.findIndex(r=>r.date===row.date);
          const rec = {id: idx>=0 ? personalData.raids[idx].id : uid(), date: row.date, totalRaw: row.totalRaw, totalNum: row.totalNum, raid1Raw: row.raid1Raw, raid1Num: row.raid1Num};
          if(idx>=0){ personalData.raids[idx] = rec; updated++; } else { personalData.raids.push(rec); added++; }
        });
        await savePersonalData();
        fileInput.value = '';
        showToast(`追加${added}件・更新${updated}件`);
      }catch(err){
        console.error(err);
        showToast('CSVの読み込みに失敗しました');
      }
      return;
    }
    if(action==='personalCsvExport'){
      const csv = personalRaidsToCsv();
      downloadCsv('personal_raids_'+todayStr()+'.csv', csv);
      return;
    }
    if(action==='savePersonalPassword'){
      const input = document.getElementById('mi-personal-new-password');
      const newPw = input ? input.value.trim() : '';
      if(!newPw){ showToast('新しいパスワードを入力してください'); return; }
      personalData.password = newPw;
      await savePersonalData();
      if(input) input.value = '';
      showToast('パスワードを変更しました');
      return;
    }

    if(action==='saveClanName'){
      const name = document.getElementById('mi-clanname').value.trim();
      settings.clanName = name;
      await saveSettings();
      showToast('保存しました');
      return;
    }
    if(action==='savePassword'){
      const input = document.getElementById('mi-new-password');
      const newPw = input.value.trim();
      if(!newPw){ showToast('新しいパスワードを入力してください'); return; }
      settings.password = newPw;
      await saveSettings();
      input.value = '';
      showToast('パスワードを変更しました');
      return;
    }
    if(action==='saveOwnerName'){
      const input = document.getElementById('mi-owner-name');
      const name = input ? input.value.trim() : '';
      settings.ownerMemberName = name;
      await saveSettings();
      showToast('保存しました');
      return;
    }

    if(action==='addName'){
      const input = document.getElementById('mi-new-name');
      const name = input.value.trim();
      if(!name){ showToast(`${scopeLabel(scope).title}名を入力してください`); return; }
      const key = scopeRosterKey(scope);
      if(!settings[key]) settings[key] = [];
      if(settings[key].includes(name)){ showToast('すでに登録されています'); return; }
      settings[key].push(name);
      await saveSettings();
      showToast(`${scopeLabel(scope).title}を追加しました`);
      return;
    }
    if(action==='removeName'){
      const key = scopeRosterKey(scope);
      if(confirm(`「${val}」を${scopeLabel(scope).panel}から削除しますか？（過去のスコア記録は残ります）`)){
        settings[key] = (settings[key]||[]).filter(m=>m!==val);
        if(scope==='cross' && settings.homeClan===val) settings.homeClan = '';
        await saveSettings();
        render();
      }
      return;
    }
    if(action==='renameName'){
      const oldName = val;
      const input = prompt(`「${oldName}」の新しい名前を入力してください`, oldName);
      const newName = (input || '').trim();
      if(!newName || newName===oldName){ return; }
      const key = scopeRosterKey(scope);
      const roster = settings[key] || [];
      if(roster.includes(newName)){
        showToast('その名前は既に登録されています');
        return;
      }
      // update roster (keep position)
      settings[key] = roster.map(n => n===oldName ? newName : n);

      // merge historical entries under the new name (same date+name pairs get merged)
      let arr = getEntries(scope).map(e => e.name===oldName ? {...e, name:newName} : e);
      const merged = [];
      const posByKey = {};
      arr.forEach(e=>{
        const k = e.date+'|'+e.name;
        if(k in posByKey){
          const m = merged[posByKey[k]];
          if((!m.scoreRaw) && e.scoreRaw) { m.scoreRaw = e.scoreRaw; m.scoreNum = e.scoreNum; }
          if(m.rank==null && e.rank!=null) m.rank = e.rank;
        } else {
          posByKey[k] = merged.length;
          merged.push({...e});
        }
      });
      setEntries(scope, merged);
      await persistEntries(scope);

      if(scope==='cross' && settings.homeClan===oldName) settings.homeClan = newName;
      if(settings.visibility && settings.visibility[scope]){
        settings.visibility[scope] = settings.visibility[scope].map(n=>n===oldName?newName:n);
      }
      if(!settings.nameHistory) settings.nameHistory = {internal:{}, cross:{}};
      if(!settings.nameHistory[scope]) settings.nameHistory[scope] = {};
      const priorHistory = settings.nameHistory[scope][oldName] || [];
      settings.nameHistory[scope][newName] = [...priorHistory, oldName];
      if(settings.nameHistory[scope][oldName]) delete settings.nameHistory[scope][oldName];
      await saveSettings();

      showToast(`「${oldName}」を「${newName}」に変更しました`);
      return;
    }
    if(action==='setHomeClan'){
      settings.homeClan = settings.homeClan===val ? '' : val;
      await saveSettings();
      render();
      return;
    }
    if(action==='moveNameUp' || action==='moveNameDown'){
      const key = scopeRosterKey(scope);
      const arr = (settings[key]||[]).slice();
      const idx = arr.indexOf(val);
      if(idx<0){ return; }
      const swapWith = action==='moveNameUp' ? idx-1 : idx+1;
      if(swapWith<0 || swapWith>=arr.length){ return; }
      [arr[idx], arr[swapWith]] = [arr[swapWith], arr[idx]];
      settings[key] = arr;
      await saveSettings();
      render();
      return;
    }
    if(action==='toggleVisible'){
      if(!settings.visibility) settings.visibility = {};
      let vis = settings.visibility[scope];
      if(!vis) vis = scopeAllKnown(scope).slice(); // first change: start from "all visible"
      vis = vis.includes(val) ? vis.filter(n=>n!==val) : [...vis, val];
      settings.visibility[scope] = vis;
      await saveSettings();
      render();
      return;
    }
    if(action==='selectAllVisible'){
      if(!settings.visibility) settings.visibility = {};
      settings.visibility[scope] = scopeAllKnown(scope).slice();
      await saveSettings();
      render();
      return;
    }
    if(action==='clearAllVisible'){
      if(!settings.visibility) settings.visibility = {};
      settings.visibility[scope] = [];
      await saveSettings();
      render();
      return;
    }
    if(action==='applyPresetOrder'){
      const key = scopeRosterKey(scope);
      const current = settings[key] || [];
      const ordered = [
        ...PRESET_CLAN_ORDER.filter(n=>current.includes(n)),
        ...current.filter(n=>!PRESET_CLAN_ORDER.includes(n))
      ];
      settings[key] = ordered;
      await saveSettings();
      showToast('並び順を変更しました');
      return;
    }

    if(action==='bulkRegister'){
      const date = sd.bulkDate || yesterdayStr();
      if(!date){ showToast('日付を選択してください'); return; }
      const inputs = document.querySelectorAll('[data-bulk-name]');
      let arr = getEntries(scope);
      let saved = 0, skipped = 0;
      inputs.forEach(inp=>{
        const name = inp.dataset.bulkName;
        const raw = inp.value.trim();
        if(!raw) return;
        const {scoreRaw, scoreNum} = parseImportedScore(raw, scope);
        if(scoreNum===null){ skipped++; return; }
        const idx = arr.findIndex(e=>e.date===date && e.name===name);
        const prevRank = idx>=0 && arr[idx].rank!=null ? arr[idx].rank : null;
        const rec = {id: idx>=0 ? arr[idx].id : uid(), date, name, scoreRaw, scoreNum, rank: prevRank};
        if(idx>=0) arr[idx] = rec; else arr.push(rec);
        saved++;
      });
      setEntries(scope, arr);
      await persistEntries(scope);
      showToast(skipped ? `${saved}件登録（${skipped}件は形式エラーでスキップ）` : `${saved}件登録しました`);
      return;
    }

    if(action==='bulkRegisterRanked'){
      const date = sd.bulkDate || yesterdayStr();
      if(!date){ showToast('日付を選択してください'); return; }
      let arr = getEntries(scope);
      const seen = new Set();
      let saved = 0, skippedDup = 0;
      let ownerSync = null;
      for(let rank=1; rank<=15; rank++){
        const sel = document.querySelector(`[data-rank-select="${rank}"]`);
        const scoreInp = document.querySelector(`[data-rank-score="${rank}"]`);
        const name = sel ? sel.value : '';
        if(!name) continue;
        if(seen.has(name)){ skippedDup++; continue; }
        seen.add(name);
        const rawScore = scoreInp ? scoreInp.value.trim() : '';
        let scoreRaw = '', scoreNum = null;
        if(rawScore){
          const parsed = parseImportedScore(rawScore, scope);
          scoreRaw = parsed.scoreRaw; scoreNum = parsed.scoreNum;
        }
        const idx = arr.findIndex(e=>e.date===date && e.name===name);
        if(idx>=0){
          const prev = arr[idx];
          arr[idx] = {
            id: prev.id, date, name, rank,
            scoreRaw: scoreRaw!=='' ? scoreRaw : prev.scoreRaw,
            scoreNum: scoreNum!==null ? scoreNum : prev.scoreNum
          };
          if(name===settings.ownerMemberName) ownerSync = arr[idx];
        } else {
          arr.push({id: uid(), date, name, rank, scoreRaw, scoreNum});
          if(name===settings.ownerMemberName) ownerSync = arr[arr.length-1];
        }
        saved++;
      }
      setEntries(scope, arr);
      await persistEntries(scope);
      if(ownerSync) await syncToPersonalIfOwner(scope, ownerSync.name, ownerSync.date, ownerSync.scoreRaw, ownerSync.scoreNum);
      showToast(skippedDup ? `${saved}件登録（同じ人が複数の順位に選ばれていたため${skippedDup}件スキップ）` : `${saved}件登録しました`);
      return;
    }

    if(action==='pasteRegister'){
      const date = sd.pasteDate || yesterdayStr();
      const textEl = document.getElementById('mi-paste-text');
      const text = textEl ? textEl.value : '';
      const rows = parseFlatTriplets(text);
      if(!rows.length){ showToast('貼り付けた内容から読み取れませんでした（形式をご確認ください）'); return; }

      let arr = getEntries(scope);
      const newNames = new Set();
      let saved = 0;
      let ownerSync = null;
      rows.forEach(row=>{
        const name = row.name.trim();
        if(!name) return;
        const {scoreRaw, scoreNum} = parseImportedScore(row.scoreRaw, scope);
        const idx = arr.findIndex(e=>e.date===date && e.name===name);
        let rec;
        if(idx>=0){
          rec = {id: arr[idx].id, date, name, rank: row.rank, scoreRaw, scoreNum};
          arr[idx] = rec;
        } else {
          rec = {id: uid(), date, name, rank: row.rank, scoreRaw, scoreNum};
          arr.push(rec);
        }
        if(name===settings.ownerMemberName) ownerSync = rec;
        newNames.add(name);
        saved++;
      });
      setEntries(scope, arr);
      await persistEntries(scope);
      if(ownerSync) await syncToPersonalIfOwner(scope, ownerSync.name, ownerSync.date, ownerSync.scoreRaw, ownerSync.scoreNum);

      const key = scopeRosterKey(scope);
      if(!settings[key]) settings[key] = [];
      let rosterAdded = 0;
      newNames.forEach(n=>{ if(!settings[key].includes(n)){ settings[key].push(n); rosterAdded++; } });
      if(rosterAdded) await saveSettings();

      if(textEl) textEl.value = '';
      showToast(`${saved}件登録しました${rosterAdded ? `（新規${scopeLabel(scope).title}${rosterAdded}件を追加）` : ''}`);
      return;
    }

    if(action==='csvImport'){
      const fileInput = document.getElementById('mi-csv-file');
      const file = fileInput && fileInput.files && fileInput.files[0];
      if(!file){ showToast('CSVファイルを選択してください'); return; }
      if(typeof Papa === 'undefined'){ showToast('CSV解析ライブラリの読み込みに失敗しました'); return; }
      try{
        const text = await readFileAsText(file);
        const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
        const headerMap = detectCsvHeaders(parsed.meta.fields || []);
        if(!headerMap.date || !headerMap.name){
          showToast('date列と名前の列が見つかりませんでした');
          return;
        }
        const existing = getEntries(scope);
        const {arr, added, updated, skipped, newNames} = importRowsToEntries(parsed.data, headerMap, existing, scope);
        setEntries(scope, arr);
        await persistEntries(scope);

        if(scope==='internal' && settings.ownerMemberName){
          const ownerEntries = arr.filter(e=>e.name===settings.ownerMemberName);
          for(const oe of ownerEntries){
            await syncToPersonalIfOwner(scope, oe.name, oe.date, oe.scoreRaw, oe.scoreNum);
          }
        }

        const key = scopeRosterKey(scope);
        if(!settings[key]) settings[key] = [];
        let rosterAdded = 0;
        newNames.forEach(n=>{ if(!settings[key].includes(n)){ settings[key].push(n); rosterAdded++; } });
        if(rosterAdded) await saveSettings();

        fileInput.value = '';
        showToast(`追加${added}件・更新${updated}件（${skipped}件スキップ）`);
      }catch(err){
        console.error(err);
        showToast('CSVの読み込みに失敗しました');
      }
      return;
    }

    if(action==='csvExport'){
      const csv = entriesToCsv(getEntries(scope), scopeLabel(scope), scope);
      const fname = (scope==='internal' ? 'member_entries_' : 'clan_entries_') + todayStr() + '.csv';
      downloadCsv(fname, csv);
      return;
    }

    if(action==='captureTable'){
      await captureTableAsImage();
      return;
    }

    if(action==='deleteEntry'){
      setEntries(scope, getEntries(scope).filter(e=>e.id!==val));
      await persistEntries(scope);
      render();
      return;
    }
    if(action==='deleteAll'){
      if(confirm('表示中のデータをすべて削除します。よろしいですか？')){
        const allEntries = getEntries(scope);
        const allDates = [...new Set(allEntries.map(e=>e.date))].sort();
        const rangeStart = sd.manageDateRangeStart || (allDates[0]||'');
        const rangeEnd = sd.manageDateRangeEnd || (allDates[allDates.length-1]||'');
        const toDeleteIds = new Set(
          allEntries
            .filter(e=> sd.manageFilter.length===0 || sd.manageFilter.includes(e.name))
            .filter(e=> !allDates.length || (e.date>=rangeStart && e.date<=rangeEnd))
            .map(e=>e.id)
        );
        const filtered = allEntries.filter(e=>!toDeleteIds.has(e.id));
        setEntries(scope, filtered);
        await persistEntries(scope);
        render();
      }
      return;
    }
  });

  // ---------- init ----------
  function init(){
    app.innerHTML = `<div class="mi-empty" style="padding:60px 0;">⏳ Firestoreに接続中...</div>`;
    startListeners();
  }
  init();
})();
</script>
