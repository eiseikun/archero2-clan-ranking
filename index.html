<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クランランキング | 魔物襲来</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;800&family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap">

<style>
  :root{
    --bg:#0a0c12;
    --bg-panel:#12151f;
    --bg-panel2:#181c29;
    --bg-panel3:#1f2432;
    --border:#262c3d;
    --border-soft:#1b2030;
    --gold:#d4af37;
    --gold-soft:#e8cf7a;
    --blood:#9b2c2c;
    --blood-bright:#c0392b;
    --banner-bright:#2f8fd4;
    --banner-mid:#1f6fae;
    --banner-dark:#123a5e;
    --cyan:#45c4b0;
    --silver:#b9c2cf;
    --bronze:#c17a4a;
    --text:#e9e7e0;
    --text-dim:#8b92a6;
    --text-faint:#5a6178;
    --up:#4fbf6a;
    --down:#e0555a;
  }
  *{box-sizing:border-box;}
  #mi-root{
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(47,143,212,0.16), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP', sans-serif;
    min-height:100%;
    padding:0 0 48px 0;
    -webkit-font-smoothing:antialiased;
  }
  .mi-wrap{max-width:640px;margin:0 auto;padding:0 16px;}

  .mi-header{position:relative;padding:28px 0 18px;text-align:center;overflow:hidden;}
  .mi-eyebrow{
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:.28em;
    color:var(--gold-soft);text-transform:uppercase;opacity:.85;margin-bottom:6px;
  }
  .mi-banner{position:relative;display:inline-block;padding:10px 38px;margin-top:2px;}
  .mi-banner::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, var(--banner-bright), var(--banner-mid) 70%, var(--banner-dark));
    clip-path:polygon(3% 0%, 97% 0%, 100% 30%, 96% 50%, 100% 70%, 97% 100%, 3% 100%, 0% 68%, 4% 50%, 0% 32%);
    box-shadow:0 8px 24px -8px rgba(47,143,212,.6);
  }
  .mi-title{
    position:relative;font-family:'Shippori Mincho',serif;font-weight:800;
    font-size:26px;letter-spacing:.06em;color:#fdf6e3;
    text-shadow:0 2px 6px rgba(0,0,0,.5);
    white-space:nowrap;
  }
  .mi-sub{margin-top:10px;font-size:11px;color:var(--text-faint);letter-spacing:.16em;font-family:'Cinzel',serif;}

  .mi-scopeswitch{display:flex;gap:8px;margin:18px 0 10px;}
  .mi-scope-btn{
    flex:1;text-align:center;padding:11px 6px;border-radius:11px;font-size:13px;font-weight:700;
    background:var(--bg-panel);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;letter-spacing:.02em;
  }
  .mi-scope-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(69,196,176,.12);box-shadow:inset 0 0 0 1px rgba(69,196,176,.25);}
  .mi-admin-btn{
    display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:999px;
    font-size:12px;font-weight:700;background:var(--bg-panel);border:1px solid var(--border);
    color:var(--text-dim);cursor:pointer;letter-spacing:.02em;
  }
  .mi-admin-btn.active{border-color:var(--gold);color:var(--gold-soft);background:rgba(212,175,55,.12);}
  .mi-admin-btn-ghost{padding:7px 11px;opacity:.55;}
  .mi-admin-btn-ghost.active{opacity:1;border-color:var(--cyan);color:var(--cyan);background:rgba(69,196,176,.12);}

  .mi-tabs{display:flex;gap:6px;margin:0 0 16px;background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:5px;}
  .mi-tab{
    flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:13px;font-weight:700;
    color:var(--text-dim);cursor:pointer;user-select:none;letter-spacing:.02em;transition:all .15s;
  }
  .mi-tab.active{background:linear-gradient(180deg,#2a2033,var(--bg-panel3));color:var(--gold-soft);box-shadow:inset 0 0 0 1px rgba(212,175,55,.35);}

  .mi-pillrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
  .mi-pillrow::-webkit-scrollbar{height:4px;}
  .mi-pillrow::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .mi-pill{
    flex:0 0 auto;padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;
    background:var(--bg-panel2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;white-space:nowrap;
  }
  .mi-pill.active{background:rgba(212,175,55,.14);border-color:var(--gold);color:var(--gold-soft);}

  .mi-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
  .mi-panel-title{font-family:'Shippori Mincho',serif;font-weight:800;font-size:15px;color:var(--gold-soft);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .mi-collapse-toggle{cursor:pointer;user-select:none;justify-content:space-between;margin-bottom:0;}
  .mi-collapsible .mi-collapse-body{margin-top:12px;}
  .mi-chevron{color:var(--text-faint);font-size:12px;}
  .mi-updated{font-size:11px;color:var(--text-faint);margin-bottom:10px;font-family:'JetBrains Mono',monospace;}

  .mi-rank-row{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--border-soft);border-left:3px solid transparent;}
  .mi-rank-row:last-child{border-bottom:none;}
  .mi-rank-row.home{border-left-color:var(--cyan);background:rgba(69,196,176,.06);border-radius:6px;}
  .mi-rank-num{
    flex:0 0 32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;background:var(--bg-panel2);color:var(--text-dim);
  }
  .mi-rank-row.r1 .mi-rank-num{background:linear-gradient(160deg,#f4d874,var(--gold));color:#2a2205;box-shadow:0 0 12px -2px rgba(212,175,55,.7);}
  .mi-rank-row.r2 .mi-rank-num{background:linear-gradient(160deg,#e4e9ee,var(--silver));color:#232830;}
  .mi-rank-row.r3 .mi-rank-num{background:linear-gradient(160deg,#e3a877,var(--bronze));color:#2b1908;}
  .mi-table-badge{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:26px;padding:0 6px;border-radius:7px;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;
    background:var(--bg-panel3);color:var(--text-dim);
  }
  .mi-table-badge.r1{background:linear-gradient(160deg,#f4d874,var(--gold));color:#2a2205;box-shadow:0 0 10px -2px rgba(212,175,55,.7);}
  .mi-table-badge.r2{background:linear-gradient(160deg,#e4e9ee,var(--silver));color:#232830;}
  .mi-table-badge.r3{background:linear-gradient(160deg,#e3a877,var(--bronze));color:#2b1908;}
  .mi-rank-clan{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mi-name-link{cursor:pointer;text-underline-offset:3px;text-decoration:underline dotted rgba(232,207,122,.4);}
  .mi-name-link:active{opacity:.6;}
  .mi-home-tag{font-size:10px;color:var(--cyan);border:1px solid var(--cyan);border-radius:5px;padding:1px 5px;margin-left:6px;font-weight:700;vertical-align:middle;}
  .mi-home-row td{background:rgba(69,196,176,.06);}
  .mi-rank-score{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan);font-size:13.5px;}
  .mi-empty{text-align:center;color:var(--text-faint);font-size:13px;padding:30px 10px;line-height:1.8;}
  .mi-noshow{padding:8px 6px;font-size:12.5px;color:var(--text-faint);border-bottom:1px solid var(--border-soft);}
  .mi-noshow:last-child{border-bottom:none;}

  .mi-btn{
    background:linear-gradient(180deg,#2a3244,var(--bg-panel3));border:1px solid var(--border);color:var(--text);
    padding:10px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em;
  }
  .mi-btn:hover{border-color:var(--gold);}
  .mi-btn-gold{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#241d05;border:none;}
  .mi-btn-cyan{background:transparent;border:1px solid var(--cyan);color:var(--cyan);}
  .mi-btn-danger{background:transparent;border:1px solid var(--blood-bright);color:#f3a3a3;}
  .mi-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .mi-btn-sm{padding:6px 10px;font-size:11.5px;border-radius:7px;}
  .mi-field{margin-bottom:12px;}
  .mi-label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.03em;}
  .mi-input, .mi-select{
    width:100%;background:var(--bg-panel2);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:8px;font-size:13.5px;font-family:'Noto Sans JP',sans-serif;
  }
  .mi-input:focus, .mi-select:focus{outline:none;border-color:var(--gold);}
  .mi-input::placeholder{color:var(--text-faint);}
  .mi-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .mi-row3{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;}
  .mi-toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg-panel3);
    border:1px solid var(--gold);color:var(--gold-soft);padding:10px 18px;border-radius:999px;font-size:12.5px;
    font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;white-space:nowrap;
  }

  .mi-subtabs{display:flex;gap:8px;margin-bottom:14px;}
  .mi-subtab{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:700;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;}
  .mi-subtab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(69,196,176,.1);}

  .mi-chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .mi-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--bg-panel2);border:1px solid var(--border);font-size:12px;}
  .mi-chip-x{cursor:pointer;color:var(--text-faint);font-weight:700;}
  .mi-chip-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}

  .mi-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11.5px;color:var(--text-dim);}
  .mi-legend span{display:inline-flex;align-items:center;gap:6px;}
  .mi-legend i{width:10px;height:10px;border-radius:2px;display:inline-block;}

  .mi-table{width:100%;border-collapse:collapse;font-size:12px;}
  .mi-table th{text-align:left;color:var(--text-faint);font-weight:600;padding:8px 6px;border-bottom:1px solid var(--border);font-size:11px;}
  .mi-table th.mi-sortable{cursor:pointer;user-select:none;white-space:nowrap;}
  .mi-table th.mi-sortable:hover{color:var(--gold-soft);}
  .mi-table td{padding:8px 6px;border-bottom:1px solid var(--border-soft);color:var(--text);}
  .mi-col-fixed{width:64px;min-width:64px;}
  .mi-table tr:hover td{background:rgba(255,255,255,.02);}
  .mi-scroll-x{overflow-x:auto;}

  .mi-daterange{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .mi-date-btn{background:var(--bg-panel2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;font-family:'JetBrains Mono',monospace;cursor:pointer;text-align:center;}
  .mi-date-btn.active{border-color:var(--gold);color:var(--gold-soft);}
  .mi-date-btn:active{border-color:var(--gold);}
  .mi-cal-panel{background:var(--bg-panel2);border:1px solid var(--border);border-radius:10px;padding:12px;margin:10px 0 16px;}
  .mi-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .mi-cal-month{font-family:'Shippori Mincho',serif;font-weight:800;color:var(--gold-soft);font-size:14px;}
  .mi-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .mi-cal-wd{text-align:center;font-size:10px;color:var(--text-faint);padding:4px 0;}
  .mi-cal-cell{text-align:center;padding:9px 0;border-radius:8px;font-size:12.5px;cursor:pointer;background:var(--bg-panel3);font-family:'JetBrains Mono',monospace;}
  .mi-cal-cell:hover{background:#2a3244;}
  .mi-cal-cell.sel{background:linear-gradient(160deg,#f4d874,var(--gold));color:#241d05;font-weight:700;}
  .mi-cal-cell.mi-cal-empty{cursor:default;background:transparent;}

  .mi-lockgate{text-align:center;padding:26px 10px;}
  .mi-modal-backdrop{position:fixed;inset:0;background:rgba(5,6,10,.72);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
  .mi-modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:18px;}
  @media (min-width:560px){
    .mi-modal-backdrop{align-items:center;padding:20px;}
    .mi-modal{border-radius:16px;max-height:76vh;}
  }
  .mi-lock-icon{font-size:28px;margin-bottom:10px;opacity:.7;}
  .mi-err{color:var(--down);font-size:12px;margin-top:8px;}
  .mi-note{font-size:11px;color:var(--text-faint);line-height:1.7;margin-top:14px;}
  .mi-diff-up{color:var(--up);}
  .mi-diff-down{color:var(--down);}
  .mi-footer-note{font-size:11px;color:var(--text-faint);line-height:2;text-align:center;margin-top:6px;}

  .mi-roster-row{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--border-soft);font-size:13px;gap:8px;flex-wrap:wrap;}
  .mi-roster-row:last-child{border-bottom:none;}
  .mi-roster-check{flex:0 0 auto;display:flex;align-items:center;}
  .mi-roster-check input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
  .mi-roster-name{flex:1;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mi-roster-actions{display:flex;gap:6px;flex:0 0 auto;flex-wrap:wrap;}

  .mi-bulk-row{display:grid;grid-template-columns:1fr 120px;gap:10px;align-items:center;padding:6px 0;}
  .mi-bulk-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  @media (max-width:400px){
    .mi-title{font-size:20px;}
    .mi-row2{grid-template-columns:1fr;}
    .mi-bulk-row{grid-template-columns:1fr 96px;}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="mi-root"><div class="mi-wrap" id="mi-app"></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore, doc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // TODO: replace with your own Firebase project config if you fork this
  const firebaseConfig = {
    apiKey: "AIzaSyBCBvYwXTGGAGw40lrq0-QBLN_Bm8eqRL4",
    authDomain: "clan-ranking2.firebaseapp.com",
    projectId: "clan-ranking2",
    storageBucket: "clan-ranking2.firebasestorage.app",
    messagingSenderId: "923540563759",
    appId: "1:923540563759:web:b056c5bbb3cd1b1de2a3da"
  };
  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);

  // All shared data lives under a single collection "clanRanking" as 3 documents.
  const COLLECTION = 'clanRanking';
  const memberEntriesRef = doc(db, COLLECTION, 'memberEntries');
  const clanEntriesRef   = doc(db, COLLECTION, 'clanEntries');
  const settingsRef      = doc(db, COLLECTION, 'settings');
  const personalRef      = doc(db, COLLECTION, 'personal');

(function(){
  const WEEKDAYS = ['月','火','水','木','金','土','日'];
  const BOSS_MAP = {'月':'墓守り','火':'ファイアドラゴン','水':'バルログ','木':'メデューサ','金':'ストーンマン','土':'一つ目の魔道士','日':'鎌の魔道士'};
  const LINE_COLORS = ['#45c4b0','#d4af37','#e0555a','#8f7fe8','#4fbf6a','#e08f45','#5aa9e6','#e6d55a'];
  const DEFAULT_SETTINGS = {password:'neko222', clanName:'', members:[], clans:[], homeClan:'', visibility:{}, nameHistory:{internal:{}, cross:{}}, ownerMemberName:'えいせい'};
  const UNRANKED = 16; // 順位は毎日15位までしか記録していないため、ランク外は16位として扱う
  const PRESET_CLAN_ORDER = ['魔導特務隊','最狂会','IgnisFloris','ポケポケ会','PopoWarren','やまだ家','ねこ海賊団','たまねぎ班','アチャ伝','天狼の戦弓団','猫の旅'];

  let memberEntries = []; // {id,date,name,scoreRaw,scoreNum}
  let clanEntries = [];   // {id,date,name,scoreRaw,scoreNum}
  let settings = {...DEFAULT_SETTINGS};
  let personalData = {password:'private123', list:[], raids:[]}; // raids: {id,date,totalRaw,totalNum,raid1Raw,raid1Num}
  let toastMsg = null;
  let toastTimer = null;

  let loadedMembers = false, loadedClans = false, loadedSettings = false, loadedPersonal = false;

  function freshScoped(){ return {rankDate:null, trendNames:[], manageFilter:[], manageDateRangeStart:null, manageDateRangeEnd:null, manageSortKey:'date', manageSortDir:'desc', bulkDate: yesterdayStr(), registerMode:'manual', pasteDate:null, tableSub:'avgRank', tableRangeStart:null, tableRangeEnd:null, calOpenField:null, calViewMonth:null, graphMode:'weekday', graphMetric:'rank', graphBoss:'月', graphRangeStart:null, graphRangeEnd:null}; }

  const DEFAULT_COLLAPSE_OPEN = {
    clanSettings:false, roster:false, bulkRegister:true,
    csvImport:false, csvExport:false, dataManage:false
  };

  let state = {
    scope:'internal', // 'internal' | 'cross'
    tab:'ranking',
    adminLoggedIn:false,
    adminErr:false,
    personalLoggedIn:false,
    personalErr:false,
    personalTab:'log', // 'log' | 'table' | 'graph'
    personalGraphMetric:'total', // 'total' | 'each'
    personalGraphWeekdays:[], // empty = all weekdays
    collapse:{},
    modal:null, // {scope, name} | null
    scopeData:{ internal: freshScoped(), cross: freshScoped() }
  };

  function isPanelOpen(key){
    if(!(key in state.collapse)) state.collapse[key] = DEFAULT_COLLAPSE_OPEN[key] || false;
    return state.collapse[key];
  }
  function collapsiblePanel(key, title, bodyHtml){
    const open = isPanelOpen(key);
    return `<div class="mi-panel mi-collapsible">
      <div class="mi-panel-title mi-collapse-toggle" data-action="toggleCollapse" data-val="${key}">
        <span>${title}</span><span class="mi-chevron">${open?'▾':'▸'}</span>
      </div>
      ${open ? `<div class="mi-collapse-body">${bodyHtml}</div>` : ''}
    </div>`;
  }

  const app = document.getElementById('mi-app');
  let memberUpdatedAt = null;
  let clanUpdatedAt = null;

  // ---------- Firestore storage ----------
  // Real-time listeners keep every open browser in sync automatically.
  function normalizeEntries(list, fallbackKeys){
    return (list||[]).map(e=>{
      let name = e.name;
      if(!name){ for(const k of fallbackKeys){ if(e[k]){ name = e[k]; break; } } }
      return {...e, name: name || ''};
    });
  }

  function startListeners(){
    onSnapshot(memberEntriesRef, snap=>{
      const data = snap.exists() ? snap.data() : {};
      memberEntries = normalizeEntries(data.list, ['member','clan']);
      memberUpdatedAt = data.updatedAt || null;
      loadedMembers = true;
      render();
    }, err=>{ console.error(err); showToast('データ取得に失敗しました'); });

    onSnapshot(clanEntriesRef, snap=>{
      const data = snap.exists() ? snap.data() : {};
      clanEntries = normalizeEntries(data.list, ['clan']);
      clanUpdatedAt = data.updatedAt || null;
      loadedClans = true;
      render();
    }, err=>{ console.error(err); showToast('データ取得に失敗しました'); });

    onSnapshot(settingsRef, snap=>{
      settings = snap.exists() ? Object.assign({}, DEFAULT_SETTINGS, snap.data()) : {...DEFAULT_SETTINGS};
      loadedSettings = true;
      render();
    }, err=>{ console.error(err); showToast('設定の取得に失敗しました'); });

    onSnapshot(personalRef, snap=>{
      personalData = snap.exists() ? Object.assign({password:'private123', list:[], raids:[]}, snap.data()) : {password:'private123', list:[], raids:[]};
      loadedPersonal = true;
      render();
    }, err=>{ console.error(err); showToast('個人記録の取得に失敗しました'); });
  }

  async function saveMemberEntries(){
    try{ await setDoc(memberEntriesRef, {list: memberEntries, updatedAt: todayStr()}); }
    catch(e){ console.error(e); showToast('保存に失敗しました'); }
  }
  async function saveClanEntries(){
    try{ await setDoc(clanEntriesRef, {list: clanEntries, updatedAt: todayStr()}); }
    catch(e){ console.error(e); showToast('保存に失敗しました'); }
  }
  async function saveSettings(){
    try{ await setDoc(settingsRef, settings); }
    catch(e){ console.error(e); showToast('保存に失敗しました'); }
  }
  async function savePersonalData(){
    try{ await setDoc(personalRef, personalData); }
    catch(e){ console.error(e); showToast('保存に失敗しました'); }
  }
  // When the clan-internal record being saved belongs to the site owner
  // (settings.ownerMemberName), mirror the daily total into the private
  // personal raid log too, so it doesn't have to be entered twice. Any
  // raid1 breakdown already stored personally is left untouched.
  async function syncToPersonalIfOwner(scope, name, date, scoreRaw, scoreNum){
    if(scope!=='internal' || !settings.ownerMemberName || name!==settings.ownerMemberName) return;
    if(scoreNum==null) return;
    if(!personalData.raids) personalData.raids = [];
    const idx = personalData.raids.findIndex(r=>r.date===date);
    if(idx>=0){
      personalData.raids[idx] = {...personalData.raids[idx], totalRaw: scoreRaw, totalNum: scoreNum};
    } else {
      personalData.raids.push({id: uid(), date, totalRaw: scoreRaw, totalNum: scoreNum, raid1Raw:'', raid1Num:null});
    }
    await savePersonalData();
  }


  function getEntries(scope){ return scope==='internal' ? memberEntries : clanEntries; }
  function setEntries(scope, arr){ if(scope==='internal') memberEntries = arr; else clanEntries = arr; }
  async function persistEntries(scope){ return scope==='internal' ? saveMemberEntries() : saveClanEntries(); }
  function scopeRosterKey(scope){ return scope==='internal' ? 'members' : 'clans'; }
  function scopeRoster(scope){
    const fromSettings = settings[scopeRosterKey(scope)] || [];
    if(fromSettings.length) return fromSettings;
    return [...new Set(getEntries(scope).map(e=>e.name))].sort();
  }
  // Preserves the admin-defined roster order (settings.members / settings.clans),
  // appending any names only found in entries (e.g. legacy data) alphabetically at the end.
  function scopeAllKnown(scope){
    const roster = settings[scopeRosterKey(scope)] || [];
    const extra = [...new Set(getEntries(scope).map(e=>e.name))].filter(n=>!roster.includes(n)).sort();
    return [...roster, ...extra];
  }
  // Visibility: settings.visibility[scope] is an array of names to show.
  // If undefined for that scope, everything is visible (default / backward compatible).
  function isNameVisible(scope, name){
    const vis = settings.visibility && settings.visibility[scope];
    if(!vis) return true;
    return vis.includes(name);
  }
  function getVisibleRoster(scope){
    return scopeAllKnown(scope).filter(n=>isNameVisible(scope, n));
  }
  function scopeLabel(scope){ return scope==='internal' ? {title:'メンバー', add:'メンバー名', panel:'メンバー管理'} : {title:'クラン', add:'クラン名', panel:'クラン管理'}; }
  function scopedState(){ return state.scopeData[state.scope]; }

  // ---------- helpers ----------
  function parseScore(str){
    if(!str) return NaN;
    const s = String(str).trim().toUpperCase().replace(/,/g,'');
    const m = s.match(/^([0-9]*\.?[0-9]+)\s*([KMBTE]?)$/);
    if(!m) return NaN;
    const mult = {'':1,'K':1e3,'M':1e6,'B':1e9,'T':1e12,'E':1e15}[m[2]];
    return parseFloat(m[1]) * mult;
  }
  function formatShort(num){
    if(num>=1e15) return (num/1e15).toFixed(2)+'E';
    if(num>=1e12) return (num/1e12).toFixed(2)+'T';
    if(num>=1e9) return (num/1e9).toFixed(2)+'B';
    if(num>=1e6) return (num/1e6).toFixed(2)+'M';
    if(num>=1e3) return (num/1e3).toFixed(2)+'K';
    return String(num);
  }
  function trimNum(n){
    let s = n.toFixed(2);
    if(s.indexOf('.')>=0) s = s.replace(/0+$/,'').replace(/\.$/,'');
    return s;
  }
  // Scope-specific CSV number convention:
  //  - cross (clan vs clan): bare number = T, e.g. "631.87" -> "631.87T". If >=1000T, switch to E ("1.5E" = 1500T).
  //  - internal (clan members): bare number = B, e.g. "24.04" -> "24.04B". If >=1000B, switch to T ("8.67T" = 8670B).
  function scopeUnitConfig(scope){
    return scope==='cross'
      ? {mult:1e12, unit:'T', upMult:1e15, upUnit:'E', showBaseSuffix:true}
      : {mult:1e9,  unit:'B', upMult:1e12, upUnit:'T', showBaseSuffix:true};
  }
  function formatScoreForScope(scoreNum, scope){
    if(scoreNum==null || isNaN(scoreNum)) return '';
    const cfg = scopeUnitConfig(scope);
    const baseCount = scoreNum/cfg.mult;
    if(baseCount >= 1000) return trimNum(scoreNum/cfg.upMult) + cfg.upUnit;
    return cfg.showBaseSuffix ? (trimNum(baseCount)+cfg.unit) : trimNum(baseCount);
  }
  // CSV export uses a plain-number convention: always expressed in the
  // scope's base unit (B for internal, T for cross), never upgraded to the
  // next unit, and with no unit letter at all — e.g. internal 3.56T -> "3560".
  function formatScoreForCsv(scoreNum, scope){
    if(scoreNum==null || isNaN(scoreNum)) return '';
    const cfg = scopeUnitConfig(scope);
    return trimNum(scoreNum/cfg.mult);
  }
  function getWeekday(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    const map = ['日','月','火','水','木','金','土'];
    return map[d.getDay()];
  }
  function todayStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function yesterdayStr(){
    const d = new Date();
    d.setDate(d.getDate()-1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtDateJP(dateStr){
    const [y,m,d] = dateStr.split('-');
    return `${m}/${d}(${getWeekday(dateStr)})`;
  }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function monthOf(dateStr){ return dateStr ? dateStr.slice(0,7) : todayStr().slice(0,7); }
  function monthLabel(viewMonth){
    const [y,m] = viewMonth.split('-');
    return `${y}年${parseInt(m,10)}月`;
  }
  function shiftMonth(viewMonth, delta){
    let [y,m] = viewMonth.split('-').map(Number);
    m += delta;
    if(m<1){ m=12; y--; } else if(m>12){ m=1; y++; }
    return `${y}-${pad2(m)}`;
  }
  function buildCalendarGrid(viewMonth, selectedDate){
    const [y,m] = viewMonth.split('-').map(Number);
    const firstDow = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="mi-cal-cell mi-cal-empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
      const isSel = dateStr===selectedDate;
      cells += `<div class="mi-cal-cell ${isSel?'sel':''}" data-action="pickCalDate" data-val="${dateStr}">${d}</div>`;
    }
    const weekdayHeader = ['日','月','火','水','木','金','土'].map(w=>`<div class="mi-cal-wd">${w}</div>`).join('');
    return `
      <div class="mi-cal-panel">
        <div class="mi-cal-header">
          <button class="mi-btn mi-btn-ghost mi-btn-sm" data-action="calPrevMonth" type="button">‹</button>
          <div class="mi-cal-month">${monthLabel(viewMonth)}</div>
          <button class="mi-btn mi-btn-ghost mi-btn-sm" data-action="calNextMonth" type="button">›</button>
        </div>
        <div class="mi-cal-grid">${weekdayHeader}${cells}</div>
      </div>`;
  }
  // Renders a "開始日/終了日" pair of tappable date buttons plus an inline calendar
  // that opens under whichever one was tapped. `target` namespaces the open/selected
  // state (e.g. "table" vs "graph") so multiple pickers can coexist per scope.
  function renderDateRangePicker(sd, startVal, endVal, target){
    const openKey = sd.calOpenField; // e.g. "table:start" / "graph:end" / null
    const isOpenStart = openKey === `${target}:start`;
    const isOpenEnd = openKey === `${target}:end`;
    const startLabel = startVal ? fmtDateJP(startVal) : '選択してください';
    const endLabel = endVal ? fmtDateJP(endVal) : '選択してください';
    let calendar = '';
    if(isOpenStart || isOpenEnd){
      const selected = isOpenStart ? startVal : endVal;
      const viewMonth = sd.calViewMonth || monthOf(selected);
      calendar = buildCalendarGrid(viewMonth, selected);
    }
    return `
      <div class="mi-daterange">
        <div class="mi-field">
          <label class="mi-label">開始日</label>
          <div class="mi-date-btn ${isOpenStart?'active':''}" data-action="openCal" data-val="${target}:start">${startLabel}</div>
        </div>
        <div class="mi-field">
          <label class="mi-label">終了日</label>
          <div class="mi-date-btn ${isOpenEnd?'active':''}" data-action="openCal" data-val="${target}:end">${endLabel}</div>
        </div>
      </div>
      ${calendar}`;
  }
  // Single-date picker (one tappable button + inline calendar), for fields
  // like "which date is this bulk entry for" that only need one date rather
  // than a start/end range. Uses the same calOpenField namespacing scheme
  // ("<target>:single") and writes straight to sd[target].
  function renderSingleDatePicker(sd, value, target){
    const isOpen = sd.calOpenField === `${target}:single`;
    const label = value ? fmtDateJP(value) : '選択してください';
    let calendar2 = '';
    if(isOpen){
      const viewMonth = sd.calViewMonth || monthOf(value);
      calendar2 = buildCalendarGrid(viewMonth, value);
    }
    return `
      <div class="mi-date-btn ${isOpen?'active':''}" data-action="openCal" data-val="${target}:single">${label}</div>
      ${calendar2}`;
  }
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function showToast(msg){
    toastMsg = msg;
    render();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ toastMsg=null; render(); }, 1800);
  }

  // ---------- daily ranking helper (shared by ranking tab and table tab) ----------
  // Uses explicit e.rank when present (e.g. imported from CSV); otherwise falls back
  // to sorting by score for that date.
  function getRankedListForDate(scope, date){
    const dayEntries = getEntries(scope).filter(e=>e.date===date);
    const hasRank = dayEntries.some(e=>e.rank!=null);
    const list = hasRank
      ? [...dayEntries].sort((a,b)=>{
          const ar = a.rank==null ? Infinity : a.rank;
          const br = b.rank==null ? Infinity : b.rank;
          if(ar!==br) return ar-br;
          return (b.scoreNum||0)-(a.scoreNum||0);
        })
      : [...dayEntries].sort((a,b)=>(b.scoreNum||0)-(a.scoreNum||0));
    return list.map((e,i)=>({...e, displayRank: e.rank!=null ? e.rank : (i+1)}));
  }
  function getRankForNameOnDate(scope, date, name){
    const rec = getRankedListForDate(scope, date).find(e=>e.name===name);
    return rec ? rec.displayRank : null;
  }

  // Builds {name -> [recent ranks]} from the most recent N recorded dates,
  // used to sort the rank-selection dropdowns so the most likely person for
  // a given rank slot appears near the top instead of buried in roster order.
  function buildRecentRankHistory(scope, lookbackDays){
    const entries = getEntries(scope);
    const recentDates = [...new Set(entries.map(e=>e.date))].sort().slice(-lookbackDays);
    const map = {};
    recentDates.forEach(d=>{
      entries.forEach(e=>{
        if(e.date===d && e.rank!=null){
          (map[e.name] = map[e.name] || []).push(e.rank);
        }
      });
    });
    return map;
  }
  // Sorts roster names by how close their recent average rank is to `rank`
  // (closest first). Names with no recent rank history sort to the bottom,
  // in their original roster order.
  function orderRosterForRank(rank, roster, historyMap){
    return roster
      .map((name, i)=>{
        const ranks = historyMap[name];
        const score = ranks && ranks.length
          ? Math.abs((ranks.reduce((a,b)=>a+b,0)/ranks.length) - rank)
          : Infinity;
        return {name, score, i};
      })
      .sort((a,b)=> a.score!==b.score ? a.score-b.score : a.i-b.i)
      .map(r=>r.name);
  }

  // ---------- CSV import / export ----------
  const CSV_HEADER_ALIASES = {
    date: ['date','日付'],
    name: ['name','clan','member','クラン','メンバー','クラン名','メンバー名'],
    score: ['score(t)','score（t）','score','スコア'],
    rank: ['rank','順位']
  };
  function detectCsvHeaders(fields){
    const norm = fields.map(f=>({orig:f, low:String(f).trim().toLowerCase()}));
    const map = {};
    for(const key of Object.keys(CSV_HEADER_ALIASES)){
      for(const alias of CSV_HEADER_ALIASES[key]){
        const hit = norm.find(f=>f.low===alias.toLowerCase());
        if(hit){ map[key]=hit.orig; break; }
      }
    }
    return map;
  }
  function parseDateFlexible(s){
    if(s==null) return null;
    const m = String(s).trim().match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(!m) return null;
    return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  }
  function parseImportedScore(raw, scope){
    if(raw==null) return {scoreRaw:'', scoreNum:null};
    const s = String(raw).trim();
    if(s===''||s==='-'||s==='ー') return {scoreRaw:'', scoreNum:null};
    let scoreNum;
    if(/[KMBTE]$/i.test(s)){
      const withSuffix = parseScore(s);
      if(isNaN(withSuffix)) return {scoreRaw:'', scoreNum:null};
      scoreNum = withSuffix;
    } else {
      const plain = parseFloat(s.replace(/,/g,''));
      if(isNaN(plain)) return {scoreRaw:'', scoreNum:null};
      scoreNum = plain * scopeUnitConfig(scope).mult; // bare number = scope's base unit
    }
    return {scoreRaw: formatScoreForScope(scoreNum, scope), scoreNum};
  }
  function parseImportedRank(raw){
    if(raw==null) return null;
    const s = String(raw).trim();
    if(s===''||s==='-') return null;
    const n = parseInt(s,10);
    return isNaN(n) ? null : n;
  }
  // Parses AI-transcribed screenshot text pasted as a flat, comma-separated
  // sequence of (rank, name, score) triplets, e.g.
  //   "1,えいせい,2.56T,2,モジュ,2.23T,3,にゃんこ船長,1.98T"
  // Tolerates line breaks in place of commas. If a triplet doesn't look
  // right (rank isn't a plain integer, or the score field doesn't start
  // with a digit), it resyncs by advancing one token at a time rather than
  // corrupting every entry after it.
  function parseFlatTriplets(text){
    const tokens = String(text||'').replace(/[\r\n]+/g, ',').split(',').map(s=>s.trim()).filter(Boolean);
    const rows = [];
    let i = 0;
    while(i < tokens.length){
      const rankTok = tokens[i], nameTok = tokens[i+1], scoreTok = tokens[i+2];
      const looksLikeRank = /^[0-9]+$/.test(rankTok||'');
      const looksLikeScore = !!(scoreTok && /^[0-9]/.test(scoreTok));
      if(looksLikeRank && nameTok && looksLikeScore){
        rows.push({rank: parseInt(rankTok,10), name: nameTok, scoreRaw: scoreTok});
        i += 3;
      } else {
        i += 1;
      }
    }
    return rows;
  }
  function readFileAsText(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=> resolve(String(reader.result||'').replace(/^\uFEFF/,''));
      reader.onerror = reject;
      reader.readAsText(file, 'UTF-8');
    });
  }
  function importRowsToEntries(rows, headerMap, existingArr, scope){
    let arr = [...existingArr];
    let added=0, updated=0, skipped=0;
    const newNames = new Set();
    rows.forEach(row=>{
      const date = headerMap.date ? parseDateFlexible(row[headerMap.date]) : null;
      const name = headerMap.name ? String(row[headerMap.name]||'').trim() : '';
      if(!date || !name){ skipped++; return; }
      const {scoreRaw, scoreNum} = headerMap.score ? parseImportedScore(row[headerMap.score], scope) : {scoreRaw:'', scoreNum:null};
      const rank = headerMap.rank ? parseImportedRank(row[headerMap.rank]) : null;
      if(scoreNum===null && rank===null){ skipped++; return; }
      const idx = arr.findIndex(e=>e.date===date && e.name===name);
      if(idx>=0){
        const prev = arr[idx];
        arr[idx] = {
          id: prev.id, date, name,
          scoreRaw: scoreRaw!=='' ? scoreRaw : prev.scoreRaw,
          scoreNum: scoreNum!==null ? scoreNum : prev.scoreNum,
          rank: rank!==null ? rank : (prev.rank!=null ? prev.rank : null)
        };
        updated++;
      } else {
        arr.push({id: uid(), date, name, scoreRaw, scoreNum: scoreNum===null?null:scoreNum, rank});
        added++;
      }
      newNames.add(name);
    });
    return {arr, added, updated, skipped, newNames};
  }
  function entriesToCsv(entries, lbl, scope){
    const rows = [['date', lbl.title==='クラン'?'clan':'member', 'score', 'rank']];
    [...entries].sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:a.name.localeCompare(b.name)))
      .forEach(e=> rows.push([e.date, e.name, formatScoreForCsv(e.scoreNum, scope), e.rank!=null?e.rank:'']));
    return rows.map(r=>r.map(v=>{
      const s = String(v);
      return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(',')).join('\n');
  }
  function downloadCsv(filename, csvText){
    const blob = new Blob(['\uFEFF'+csvText], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------- personal records CSV (date,score,score1 = date,total,raid1) ----------
  function parsePersonalCsv(text){
    if(typeof Papa === 'undefined') return {rows:[], headerError:true};
    const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
    const fields = (parsed.meta.fields||[]).map(f=>f.trim());
    const dateCol = fields.find(f=>f.toLowerCase()==='date');
    const scoreCol = fields.find(f=>f.toLowerCase()==='score');
    const score1Col = fields.find(f=>f.toLowerCase()==='score1');
    if(!dateCol || !scoreCol) return {rows:[], headerError:true};
    const rows = [];
    parsed.data.forEach(row=>{
      const date = parseDateFlexible(row[dateCol]);
      if(!date) return;
      const totalRawInput = String(row[scoreCol]==null?'':row[scoreCol]).trim();
      if(!totalRawInput) return; // total is required
      const totalParsed = parseImportedScore(totalRawInput, 'internal');
      if(totalParsed.scoreNum==null) return;
      let raid1Raw='', raid1Num=null;
      if(score1Col){
        const r1 = String(row[score1Col]==null?'':row[score1Col]).trim();
        if(r1){
          const p = parseImportedScore(r1, 'internal');
          if(p.scoreNum!=null){ raid1Raw = p.scoreRaw; raid1Num = p.scoreNum; }
        }
      }
      rows.push({date, totalRaw: totalParsed.scoreRaw, totalNum: totalParsed.scoreNum, raid1Raw, raid1Num});
    });
    return {rows};
  }
  function personalRaidsToCsv(){
    const rows = [['date','score','score1']];
    [...(personalData.raids||[])].sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0))
      .forEach(r=> rows.push([r.date, formatScoreForCsv(r.totalNum,'internal'), r.raid1Num!=null?formatScoreForCsv(r.raid1Num,'internal'):'']));
    return rows.map(r=>r.map(v=>{
      const s = String(v);
      return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(',')).join('\n');
  }

  // ---------- screenshot export (table tab -> PNG) ----------
  function renderCaptureButton(){
    return `<div style="margin-bottom:14px;text-align:right;">
      <button class="mi-btn mi-btn-ghost mi-btn-sm" data-action="captureTable">📸 画像として保存</button>
    </div>`;
  }
  async function captureTableAsImage(){
    if(typeof html2canvas === 'undefined'){
      showToast('画像化ライブラリの読み込みに失敗しました');
      return;
    }
    const el = document.getElementById('mi-capture-area');
    if(!el){ showToast('キャプチャ対象が見つかりません'); return; }

    // Temporarily force only the *actually overflowing* horizontally-scrollable
    // tables to their full natural width, so wide tables (e.g. the cross-server
    // weekday matrix) aren't clipped. Narrow tables that already fit are left
    // completely untouched so their normal centered/balanced layout is preserved.
    const scrollers = Array.from(el.querySelectorAll('.mi-scroll-x'))
      .filter(s => s.scrollWidth > s.clientWidth + 1);
    const prevScrollerStyles = scrollers.map(s=>({el:s, overflow:s.style.overflow, width:s.style.width, maxWidth:s.style.maxWidth}));
    scrollers.forEach(s=>{
      s.style.overflow = 'visible';
      s.style.width = 'max-content';
      s.style.maxWidth = 'none';
    });
    const prevElWidth = el.style.width, prevElMaxWidth = el.style.maxWidth;
    let fullWidth = el.offsetWidth;
    if(scrollers.length){
      fullWidth = Math.max(el.scrollWidth, el.offsetWidth, ...scrollers.map(s=>s.scrollWidth), 1);
      el.style.width = fullWidth + 'px';
      el.style.maxWidth = 'none';
    }

    let canvas;
    try{
      canvas = await html2canvas(el, {
        backgroundColor:'#0a0c12',
        scale:2,
        useCORS:true,
        width: fullWidth,
        windowWidth: fullWidth + 40
      });
    }catch(err){
      console.error(err);
    } finally {
      // restore original styles right away, regardless of success — no need
      // to keep the layout expanded once the canvas has been rendered
      el.style.width = prevElWidth;
      el.style.maxWidth = prevElMaxWidth;
      prevScrollerStyles.forEach(p=>{
        p.el.style.overflow = p.overflow;
        p.el.style.width = p.width;
        p.el.style.maxWidth = p.maxWidth;
      });
    }
    if(!canvas){
      showToast('画像の生成に失敗しました');
      return;
    }

    try{
      await new Promise(resolve=>{
        canvas.toBlob(async (blob)=>{
          if(!blob){ resolve(); return; }
          const filename = `ranking_table_${todayStr()}.png`;
          try{
            const file = new File([blob], filename, {type:'image/png'});
            if(navigator.canShare && navigator.canShare({files:[file]})){
              await navigator.share({files:[file], title:filename});
              resolve();
              return;
            }
          }catch(shareErr){
            // user cancelled the share sheet, or share failed — fall back to direct download below
          }
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
          resolve();
        }, 'image/png');
      });
      showToast('画像を保存しました');
    }catch(err){
      console.error(err);
      showToast('画像の生成に失敗しました');
    }
  }

  // ---------- render root ----------
  function render(){
    if(!(loadedMembers && loadedClans && loadedSettings && loadedPersonal)){
      app.innerHTML = `<div class="mi-empty" style="padding:60px 0;">⏳ Firestoreに接続中...</div>`;
      return;
    }
    // preserve horizontal scroll position of pill rows across full re-renders
    const scrollPositions = {};

        const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';

        const scoreDisplay = formatScoreForScope(e.scoreNum, scope);
        return `<div class="mi-rank-row ${rankClass} ${isHome?'home':''}">

  // クラン内・クロスサーバーの両方で共通利用
  function renderGraphUnified(scope){
    const sd = scopedState();
    const entries = getEntries(scope);
    const lbl = scopeLabel(scope);
    const allDatesAsc = [...new Set(entries.map(e=>e.date))].sort();

    const rangeStart = sd.graphRangeStart || (allDatesAsc[0]||todayStr());
    const rangeEnd = sd.graphRangeEnd || (allDatesAsc[allDatesAsc.length-1]||todayStr());

    let dates;
    if(sd.graphMode==='range'){

    } else if(series.length){
      chart = buildLineChart(dates, series, {

    return `

          <div class="mi-pillrow" id="mi-graph-boss-pillrow" data-preserve-scroll>${WEEKDAYS.map(w=>
            `<div class="mi-pill ${w===sd.graphBoss?'active':''}" data-action="graphBoss" data-val="${w}">${w} ${BOSS_MAP[w]}</div>`
          ).join('')}</div>
        ` : renderDateRangePicker(sd, rangeStart, rangeEnd, 'graph')}

        <div class="mi-panel-title" style="margin-top:14px;">表示する指標</div>
        <div class="mi-subtabs">
          <div class="mi-subtab ${metric==='rank'?'active':''}" data-action="graphMetric" data-val="rank">ランキングの推移</div>
          <div class="mi-subtab ${metric==='score'?'active':''}" data-action="graphMetric" data-val="score">スコアの推移</div>
        </div>

        <div class="mi-field" style="margin-top:14px;">
          <label class="mi-label">${lbl.title}を追加</label>
          <div class="mi-row2">
            <select class="mi-select" id="mi-trend-select">
              ${nameOpts.length ? nameOpts.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('') : `<option value="">${lbl.title}がいません</option>`}
            </select>
            <button class="mi-btn" data-action="addTrendName">追加</button>

          </div>

        <div class="mi-chiprow">
          ${sd.trendNames.map((m,i)=>`<div class="mi-chip"><span class="mi-chip-dot" style="background:${LINE_COLORS[i%LINE_COLORS.length]}"></span>${esc(m)}<span class="mi-chip-x" data-action="removeTrendName" data-val="${esc(m)}">✕</span></div>`).join('')}
        </div>

        ${chart}
      </div>`;
  }

  function buildLineChart(dates, series, opts){
    opts = opts || {};
    const invert = !!opts.invert;
    const labelFormatter = opts.labelFormatter || formatShort;
    const integerTicks = !!opts.integerTicks;
    const W=560,H=240,padL=44,padR=14,padT=16,padB=30;
    const allVals = series.flatMap(s=>s.pts).filter(v=>v!==null);
    if(!allVals.length) return `<div class="mi-empty">選択した項目のデータがありません</div>`;
    let min = Math.min(...allVals), max = Math.max(...allVals);
    if(min===max){ min = min-1; max = max+1; }
    const xStep = dates.length>1 ? (W-padL-padR)/(dates.length-1) : 0;
    const yScale = invert
      ? (v => padT + ((v-min)/(max-min))*(H-padT-padB))
      : (v => H-padB - ((v-min)/(max-min))*(H-padT-padB));
    const xScale = i => padL + i*xStep;

    // Pick grid-line values: for integer-ish data (e.g. rank) with a small
    // range, evenly-fractional ticks often round to the same integer twice
    // (e.g. "1位,1位,2位,2位"). Use whole-number steps instead so every
    // tick is distinct.
    let tickValues;
    if(integerTicks){
      const lo = Math.floor(min), hi = Math.ceil(max);
      const range = Math.max(1, hi - lo);
      const maxTicks = 5;
      const step = Math.max(1, Math.ceil(range / (maxTicks-1)));
      tickValues = [];
      for(let v=lo; v<hi; v+=step) tickValues.push(v);
      tickValues.push(hi);
    } else {
      tickValues = [0,0.25,0.5,0.75,1].map(t=> invert ? (min + t*(max-min)) : (max - t*(max-min)));
    }

    const gridLines = tickValues.map(val=>{
      const y = yScale(val);
      return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#262c3d" stroke-width="1"/>
              <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#8b92a6" font-family="JetBrains Mono">${labelFormatter(val)}</text>`;
    }).join('');

    const xLabels = dates.map((d,i)=>{
      if(dates.length>8 && i%Math.ceil(dates.length/8)!==0) return '';
      return `<text x="${xScale(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#8b92a6" font-family="JetBrains Mono">${d.slice(5)}</text>`;
    }).join('');

    const lines = series.map(s=>{
      let path='', started=false;
      s.pts.forEach((v,i)=>{
        if(v===null) return;
        const cmd = started ? 'L' : 'M';
        path += `${cmd}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)} `;
        started = true;
      });
      const dots = s.pts.map((v,i)=> v===null ? '' : `<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(v).toFixed(1)}" r="3" fill="${s.color}"/>`).join('');
      return `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2.2"/>${dots}`;
    }).join('');

    const legend = series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.clan)}</span>`).join('');

    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin-top:10px;">
      ${gridLines}${xLabels}${lines}
    </svg>
    <div class="mi-legend">${legend}</div>`;
  }

  // ---------- table tab ----------
  function renderTableControls(){
    if(state.scope!=='internal') return '';
    const sd = scopedState();
    return `
      <div class="mi-subtabs">
        <div class="mi-subtab ${sd.tableSub==='avgRank'?'active':''}" data-action="tableSub" data-val="avgRank">平均順位</div>
        <div class="mi-subtab ${sd.tableSub==='avgScore'?'active':''}" data-action="tableSub" data-val="avgScore">平均スコア</div>
        <div class="mi-subtab ${sd.tableSub==='bestScore'?'active':''}" data-action="tableSub" data-val="bestScore">個人別最高スコア</div>
      </div>`;

  function renderTableContent(){
    if(state.scope!=='internal') return renderTableCross();
    const sd = scopedState();
    if(sd.tableSub==='avgRank') return renderAvgRankTable();
    if(sd.tableSub==='avgScore') return renderAvgScoreTable();
    return renderBestScoreTable();
  }

  function renderTableCross(){
    const scope = 'cross';
    const entries = getEntries(scope);
    const roster = getVisibleRoster(scope);

    const rows = roster.map(name=>{
      const cells = WEEKDAYS.map(w=>{
        const matches = entries.filter(e=>e.name===name && e.scoreNum!=null && getWeekday(e.date)===w);
        if(!matches.length) return null;
        const best = matches.reduce((a,b)=> b.scoreNum>a.scoreNum?b:a);
        return formatScoreForScope(best.scoreNum, scope);
      });
      return {name, cells};
    });

    const isHome = n => settings.homeClan && n===settings.homeClan;
    const body = rows.length ? rows.map(r=>`
      <tr class="${isHome(r.name)?'mi-home-row':''}">
        <td>${esc(r.name)}${isHome(r.name)?'<span class="mi-home-tag">自クラン</span>':''}</td>
        ${r.cells.map(c=>`<td class="mi-col-fixed" style="font-family:'JetBrains Mono',monospace;text-align:right;white-space:nowrap;">${c?esc(c):'ー'}</td>`).join('')}
      </tr>
    `).join('') : `<tr><td colspan="8" style="text-align:center;color:var(--text-faint);padding:20px 0;">データがありません</td></tr>`;

    return `
      <div class="mi-panel">
        <div class="mi-panel-title">🏅 曜日別クラン最高記録</div>
        <div class="mi-note" style="margin-top:0;margin-bottom:10px;">各クランがその曜日（ボス）で過去に出した最高スコアを表示します。</div>
        <div class="mi-scroll-x">
        <table class="mi-table">
          <thead><tr><th>クラン</th>${WEEKDAYS.map(w=>`<th class="mi-col-fixed" style="text-align:right;">${w}</th>`).join('')}</tr></thead>
          <tbody>${body}</tbody>
        </table>
        </div>
      </div>`;
  }

  function rankBadge(rank){
    const cls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    return `<span class="mi-table-badge ${cls}">${rank}</span>`;
  }

  function renderAvgRankTable(){
    const scope = 'internal';
    const sd = scopedState();
    const entries = getEntries(scope);
    const allDatesAsc = [...new Set(entries.map(e=>e.date))].sort();
    const start = sd.tableRangeStart || (allDatesAsc[0]||todayStr());
    const end = sd.tableRangeEnd || (allDatesAsc[allDatesAsc.length-1]||todayStr());
    const activeDates = allDatesAsc.filter(d=> d>=start && d<=end);

    const roster = scopeAllKnown(scope);
    let rows = roster.map(name=>{
      if(!activeDates.length) return null;
      const ranks = activeDates.map(d=>{
        const r = getRankForNameOnDate(scope, d, name);
        return r==null ? UNRANKED : r;
      });
      const avg = ranks.reduce((a,b)=>a+b,0)/ranks.length;
      return {name, avg};
    }).filter(r=> r && r.avg < UNRANKED - 1e-9);
    rows.sort((a,b)=>a.avg-b.avg);

    const body = rows.length ? rows.map((r,i)=>`
      <tr><td>${rankBadge(i+1)}</td><td>${esc(r.name)}</td><td style="font-family:'JetBrains Mono',monospace;">${r.avg.toFixed(2)}</td></tr>
    `).join('') : `<tr><td colspan="3" style="text-align:center;color:var(--text-faint);padding:20px 0;">対象期間にランクインしたデータがありません</td></tr>`;

    return `
      <div class="mi-panel">
        <div class="mi-panel-title">📊 平均順位</div>
        <div class="mi-note" style="margin-top:0;margin-bottom:10px;">指定期間中、15位以内に入れなかった日は16位として平均を計算します（一度も入れなかった人は表示されません）。</div>
        ${renderDateRangePicker(sd, start, end, 'table')}
        <div class="mi-scroll-x">
        <table class="mi-table">
          <thead><tr><th>順位</th><th>名前</th><th>平均順位</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
        </div>
      </div>`;
  }

  function renderAvgScoreTable(){
    const scope = 'internal';
    const sd = scopedState();
    const entries = getEntries(scope);
    const allDatesAsc = [...new Set(entries.map(e=>e.date))].sort();
    const start = sd.tableRangeStart || (allDatesAsc[0]||todayStr());
    const end = sd.tableRangeEnd || (allDatesAsc[allDatesAsc.length-1]||todayStr());
    const activeDates = allDatesAsc.filter(d=> d>=start && d<=end);
    // Require score data on at least half the days in range (min 1) before a
    // member is eligible for the average-score ranking. Without this, someone
    // who only ever placed once — with a single lucky high score — would
    // otherwise show a misleadingly high "average" based on just one data point.
    const minCount = Math.max(1, Math.ceil(activeDates.length * 0.5));

    const roster = scopeAllKnown(scope);
    let rows = roster.map(name=>{
      const scores = activeDates
        .map(d=>{
          const rec = entries.find(e=>e.date===d && e.name===name);
          return rec && rec.scoreNum!=null ? rec.scoreNum : null;
        })
        .filter(v=>v!=null);
      if(scores.length < minCount) return null;
      const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
      return {name, avg, count:scores.length};
    }).filter(Boolean);
    rows.sort((a,b)=>b.avg-a.avg);

    const body = rows.length ? rows.map((r,i)=>`
      <tr><td>${rankBadge(i+1)}</td><td>${esc(r.name)}</td><td style="font-family:'JetBrains Mono',monospace;">${esc(formatScoreForScope(r.avg, scope))}</td><td style="font-family:'JetBrains Mono',monospace;color:var(--text-faint);font-size:11px;">${r.count}/${activeDates.length}日</td></tr>
    `).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--text-faint);padding:20px 0;">対象期間に十分なスコアデータがある人がいません</td></tr>`;

    return `
      <div class="mi-panel">
        <div class="mi-panel-title">📊 平均スコア</div>
        <div class="mi-note" style="margin-top:0;margin-bottom:10px;">対象期間の半分未満しかスコアが記録されていない人は、1日だけの好記録で平均が歪まないよう除外しています（最低${minCount}日分のデータが必要）。</div>
        ${renderDateRangePicker(sd, start, end, 'table')}
        <div class="mi-scroll-x">
        <table class="mi-table">
          <thead><tr><th>順位</th><th>名前</th><th>平均スコア</th><th>記録日数</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
        </div>
      </div>`;
  }

  function renderBestScoreTable(){
    const scope = 'internal';
    const entries = getEntries(scope);
    const roster = scopeAllKnown(scope);
    let rows = roster.map(name=>{
      const own = entries.filter(e=>e.name===name && e.scoreNum!=null);
      if(!own.length) return null;
      const best = own.reduce((a,b)=> b.scoreNum>a.scoreNum?b:a);
      return {name, best: best.scoreNum, date: best.date, scoreRaw: formatScoreForScope(best.scoreNum, scope)};
    }).filter(Boolean);
    rows.sort((a,b)=>b.best-a.best);

    const body = rows.length ? rows.map((r,i)=>`
      <tr><td>${rankBadge(i+1)}</td><td>${esc(r.name)}</td><td style="font-family:'JetBrains Mono',monospace;">${esc(r.scoreRaw)}</td><td style="font-family:'JetBrains Mono',monospace;">${fmtDateJP(r.date)}</td></tr>
    `).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--text-faint);padding:20px 0;">スコアデータがありません</td></tr>`;

    return `
      <div class="mi-panel">
        <div class="mi-panel-title">🏅 個人別最高スコア</div>
        <div class="mi-scroll-x">
        <table class="mi-table">
          <thead><tr><th>順位</th><th>名前</th><th>最高スコア</th><th>達成日</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
        </div>
      </div>`;
  }
